# SmartPACS - Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d --build

name: smartpacs

services:
  traefik:
    # Pinned minor versions of Traefik bundle an old Docker client that this
    # host's Docker Engine (29.x) rejects (client requests API 1.24, daemon
    # requires 1.40+). DOCKER_API_VERSION is not honored by Traefik's docker
    # provider, so track latest instead of pinning to get an updated client.
    image: traefik:latest
    container_name: smartpacs-traefik
    restart: always
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --api.dashboard=false
      - --api.insecure=false
      - --log.level=INFO
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - smartpacs-net

  postgres:
    image: postgres:16-alpine
    container_name: smartpacs-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-smartpacs}
      POSTGRES_USER: ${DB_USER:-smartpacs}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-smartpacs}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartpacs-net

  redis:
    image: redis:7-alpine
    container_name: smartpacs-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - '6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartpacs-net

  orthanc:
    # Central DICOM archive that the API's DICOMweb proxy queries for OHIF.
    # Not exposed via Traefik at all -- only containers on smartpacs-net (the
    # api container) can reach it. No raw DICOM C-STORE port; studies arrive
    # here only via DICOMweb STOW-RS pushed through the API.
    image: orthancteam/orthanc:24.11.0
    container_name: smartpacs-orthanc
    restart: always
    environment:
      ORTHANC__NAME: SmartPACS
      ORTHANC__DICOM_WEB__ENABLE: 'true'
      ORTHANC__DICOM_WEB__ROOT: /dicom-web/
      ORTHANC__AUTHENTICATION_ENABLED: 'true'
      ORTHANC__REGISTERED_USERS: '{"smartpacs-api": "${ORTHANC_API_PASSWORD}"}'
      ORTHANC__DICOM_AET: SMARTPACS_CLOUD
      ORTHANC__DICOM_SERVER_ENABLED: 'false'
      ORTHANC__CONCURRENT_JOBS: '2' # keep CPU usage bounded on the 1-vCPU host
    volumes:
      - orthanc_data:/var/lib/orthanc/db
    expose:
      - '8042'
    healthcheck:
      # The orthancteam/orthanc image ships neither curl nor wget; use bash's
      # /dev/tcp to confirm something is listening on 8042. Exec form (one
      # arg per array item) avoids any shell-quoting ambiguity.
      test: ['CMD', 'bash', '-c', 'echo > /dev/tcp/127.0.0.1/8042']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - smartpacs-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
        reservations:
          cpus: '0.1'
          memory: 128M

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: smartpacs-api
    restart: always
    env_file: .env.production
    environment:
      NODE_ENV: production
    expose:
      - '3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orthanc:
        condition: service_started
    volumes:
      - api_storage:/app/storage
      - api_logs:/app/logs
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - smartpacs-net
    labels:
      traefik.enable: 'true'
      traefik.docker.network: smartpacs-net
      traefik.http.routers.smartpacs-api.rule: Host(`app.smartpacs.com.br`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`) || PathPrefix(`/docs`) || PathPrefix(`/health`))
      traefik.http.routers.smartpacs-api.entrypoints: websecure
      traefik.http.routers.smartpacs-api.tls: 'true'
      traefik.http.routers.smartpacs-api.tls.certresolver: letsencrypt
      traefik.http.routers.smartpacs-api.priority: '10'
      traefik.http.services.smartpacs-api.loadbalancer.server.port: '3001'
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${API_URL}
        NEXT_PUBLIC_APP_URL: ${APP_URL}
    container_name: smartpacs-web
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL}
      NEXT_PUBLIC_APP_URL: ${APP_URL}
    expose:
      - '3000'
    depends_on:
      - api
    networks:
      - smartpacs-net
    labels:
      traefik.enable: 'true'
      traefik.docker.network: smartpacs-net
      traefik.http.routers.smartpacs-web.rule: Host(`app.smartpacs.com.br`)
      traefik.http.routers.smartpacs-web.entrypoints: websecure
      traefik.http.routers.smartpacs-web.tls: 'true'
      traefik.http.routers.smartpacs-web.tls.certresolver: letsencrypt
      traefik.http.routers.smartpacs-web.priority: '1'
      traefik.http.services.smartpacs-web.loadbalancer.server.port: '3000'

  ohif:
    image: ohif/app:v3.9.0
    container_name: smartpacs-ohif
    restart: always
    volumes:
      - ./infrastructure/docker/ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
    expose:
      - '80'
    networks:
      - smartpacs-net
    labels:
      traefik.enable: 'true'
      traefik.docker.network: smartpacs-net
      traefik.http.routers.smartpacs-ohif.rule: Host(`viewer.smartpacs.com.br`)
      traefik.http.routers.smartpacs-ohif.entrypoints: websecure
      traefik.http.routers.smartpacs-ohif.tls: 'true'
      traefik.http.routers.smartpacs-ohif.tls.certresolver: letsencrypt
      traefik.http.services.smartpacs-ohif.loadbalancer.server.port: '80'
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  landing:
    image: nginx:1.27-alpine
    container_name: smartpacs-landing
    restart: always
    volumes:
      # Switch back to ./apps/landing/site once the full landing page is ready to publish.
      - ./apps/landing/coming-soon:/usr/share/nginx/html:ro
    networks:
      - smartpacs-net
    labels:
      traefik.enable: 'true'
      traefik.docker.network: smartpacs-net
      traefik.http.routers.smartpacs-landing.rule: Host(`smartpacs.com.br`) || Host(`www.smartpacs.com.br`)
      traefik.http.routers.smartpacs-landing.entrypoints: websecure
      traefik.http.routers.smartpacs-landing.tls: 'true'
      traefik.http.routers.smartpacs-landing.tls.certresolver: letsencrypt
      traefik.http.services.smartpacs-landing.loadbalancer.server.port: '80'

networks:
  smartpacs-net:
    name: smartpacs-net
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  orthanc_data:
  api_storage:
  api_logs:
  traefik_letsencrypt:
