version: '3.9'

# DicomCloud - Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d

name: dicomcloud-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: dicomcloud-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-dicomcloud}
      POSTGRES_USER: ${DB_USER:-dicomcloud}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-dicomcloud}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dicomcloud-net

  redis:
    image: redis:7-alpine
    container_name: dicomcloud-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - '6379'
    networks:
      - dicomcloud-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: dicomcloud-api
    restart: always
    env_file: .env.production
    environment:
      NODE_ENV: production
    expose:
      - '3001'
    volumes:
      - api_storage:/app/storage
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dicomcloud-net
      - traefik_proxy
    labels:
      traefik.enable: 'true'
      traefik.docker.network: traefik_proxy
      traefik.http.routers.dicomcloud-api.rule: Host(`smartpacs.com.br`, `www.smartpacs.com.br`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`) || PathPrefix(`/docs`) || PathPrefix(`/health`))
      traefik.http.routers.dicomcloud-api.entrypoints: websecure
      traefik.http.routers.dicomcloud-api.tls: 'true'
      traefik.http.routers.dicomcloud-api.tls.certresolver: letsencrypt
      traefik.http.routers.dicomcloud-api.priority: '10'
      traefik.http.services.dicomcloud-api.loadbalancer.server.port: '3001'
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${API_URL}
        NEXT_PUBLIC_APP_URL: ${APP_URL}
    container_name: dicomcloud-web
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL}
      NEXT_PUBLIC_APP_URL: ${APP_URL}
    expose:
      - '3000'
    depends_on:
      - api
    networks:
      - dicomcloud-net
      - traefik_proxy
    labels:
      traefik.enable: 'true'
      traefik.docker.network: traefik_proxy
      traefik.http.routers.dicomcloud-web.rule: Host(`smartpacs.com.br`, `www.smartpacs.com.br`)
      traefik.http.routers.dicomcloud-web.entrypoints: websecure
      traefik.http.routers.dicomcloud-web.tls: 'true'
      traefik.http.routers.dicomcloud-web.tls.certresolver: letsencrypt
      traefik.http.routers.dicomcloud-web.priority: '1'
      traefik.http.services.dicomcloud-web.loadbalancer.server.port: '3000'

networks:
  dicomcloud-net:
    driver: bridge
  traefik_proxy:
    external: true

volumes:
  postgres_data:
  redis_data:
  api_storage:
  api_logs:
