<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPACS — Em breve</title>
<meta name="robots" content="noindex">
<style>
  :root { --bg: #0a0e1a; --text: #e7eaf3; --text-muted: #94a0c0; --primary: #22c55e; --border: #232b45; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    text-align: center;
    padding: 24px;
  }
  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1.4rem;
    margin-bottom: 24px;
  }
  .brand-mark { color: var(--primary); }
  h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); margin: 0 0 12px; }
  p { color: var(--text-muted); max-width: 460px; margin: 0 auto; }
  .card {
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 32px;
    background: #0f1424;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="brand-mark">◆</span><span>SmartPACS</span></div>
    <h1>Em breve.</h1>
    <p>Estamos preparando nossa página. Já é cliente? <a href="https://app.smartpacs.com.br/login" style="color:var(--primary)">Acesse a plataforma</a>.</p>
  </div>
</body>
</html>
